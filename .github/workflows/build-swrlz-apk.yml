name: Build SWRLZ APK

on:
  workflow_dispatch:
    inputs:
      source_zip:
        description: "Optional source ZIP path. Leave blank to use latest/request."
        required: false
        default: ""
      sha_file:
        description: "Optional SHA256 file path."
        required: false
        default: ""
      release_name:
        description: "Optional release label."
        required: false
        default: ""
      commit_release_artifacts:
        description: "Commit APK output and update manifests."
        required: false
        type: boolean
        default: false
  push:
    paths:
      - "BUILD_REQUESTS/*.trigger"
      - "BUILD_REQUESTS/*.request"
      - "SOURCES/SWRLZ_CORE_*_SOURCE*.zip"
      - "SOURCES/SWRLZ_CORE_*_SHA256*.txt"
      - ".github/workflows/build-swrlz-apk.yml"

permissions:
  contents: write

defaults:
  run:
    shell: bash

env:
  SWRLZ_SOURCES_DIR: SOURCES
  SWRLZ_BUILD_REQUESTS_DIR: BUILD_REQUESTS
  SWRLZ_BUILD_WORK_DIR: BUILD_WORK
  SWRLZ_RELEASES_DIR: RELEASES
  SWRLZ_UPDATES_DIR: UPDATES

jobs:
  build-swrlz-apk:
    name: Build SWRLZ APK from source ZIP
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Resolve source request
        id: resolve
        env:
          INPUT_SOURCE_ZIP: ${{ github.event.inputs.source_zip }}
          INPUT_SHA_FILE: ${{ github.event.inputs.sha_file }}
          INPUT_RELEASE_NAME: ${{ github.event.inputs.release_name }}
          INPUT_COMMIT_RELEASE_ARTIFACTS: ${{ github.event.inputs.commit_release_artifacts }}
        run: |
          set -euo pipefail
          mkdir -p "$SWRLZ_SOURCES_DIR" "$SWRLZ_BUILD_REQUESTS_DIR" "$SWRLZ_BUILD_WORK_DIR" "$SWRLZ_RELEASES_DIR" "$SWRLZ_UPDATES_DIR"

          REQUEST_FILE="$(find "$SWRLZ_BUILD_REQUESTS_DIR" -maxdepth 1 -type f \( -name '*.trigger' -o -name '*.request' \) 2>/dev/null | sort -V | tail -n 1 || true)"
          R_SOURCE=""
          R_SHA=""
          R_RELEASE=""
          R_COMMIT="false"
          if [[ -n "${REQUEST_FILE:-}" && -f "$REQUEST_FILE" ]]; then
            echo "Using build request: $REQUEST_FILE"
            cat "$REQUEST_FILE"
            R_SOURCE="$(grep -E '^source_zip=' "$REQUEST_FILE" | tail -n 1 | cut -d= -f2- || true)"
            R_SHA="$(grep -E '^sha_file=' "$REQUEST_FILE" | tail -n 1 | cut -d= -f2- || true)"
            R_RELEASE="$(grep -E '^release_name=' "$REQUEST_FILE" | tail -n 1 | cut -d= -f2- || true)"
            R_COMMIT="$(grep -E '^commit_release_artifacts=' "$REQUEST_FILE" | tail -n 1 | cut -d= -f2- || true)"
            if [[ -z "${R_COMMIT:-}" ]]; then R_COMMIT="true"; fi
          fi

          ZIP="${INPUT_SOURCE_ZIP:-${R_SOURCE:-}}"
          if [[ -z "${ZIP:-}" ]]; then
            ZIP="$(find "$SWRLZ_SOURCES_DIR" . -maxdepth 4 -type f -iname 'SWRLZ_CORE_*_SOURCE*.zip' ! -iname '*APK_DOWNLOAD*' 2>/dev/null | sort -V | tail -n 1)"
          fi
          if [[ -z "${ZIP:-}" || ! -f "$ZIP" ]]; then
            echo "Could not resolve source ZIP." >&2
            find "$SWRLZ_SOURCES_DIR" . -maxdepth 4 -type f -iname '*.zip' 2>/dev/null | sort >&2 || true
            exit 1
          fi

          ZIP_BASE="$(basename "$ZIP")"
          KEY="${ZIP_BASE%%_SOURCE*}"
          SHA="${INPUT_SHA_FILE:-${R_SHA:-}}"
          if [[ -z "${SHA:-}" ]]; then
            SHA="$(find "$SWRLZ_SOURCES_DIR" . -maxdepth 4 -type f -iname "${KEY}*SHA256*.txt" 2>/dev/null | sort -V | tail -n 1 || true)"
          fi
          if [[ -n "${SHA:-}" && ! -f "$SHA" ]]; then
            echo "Specified SHA file not found: $SHA" >&2
            exit 1
          fi

          RELEASE="${INPUT_RELEASE_NAME:-${R_RELEASE:-}}"
          if [[ -z "${RELEASE:-}" ]]; then
            RELEASE="${ZIP_BASE%.zip}"
            RELEASE="${RELEASE%_SOURCE}"
          fi
          COMMIT_RELEASE_ARTIFACTS="${INPUT_COMMIT_RELEASE_ARTIFACTS:-${R_COMMIT:-false}}"
          SAFE_RELEASE="$(echo "$RELEASE" | tr -cs 'A-Za-z0-9._-' '_' | sed 's/^_*//;s/_*$//')"
          EXTRACT_DIR="$GITHUB_WORKSPACE/$SWRLZ_BUILD_WORK_DIR/$SAFE_RELEASE/extracted"

          echo "source_zip=$ZIP" >> "$GITHUB_OUTPUT"
          echo "source_zip_base=$ZIP_BASE" >> "$GITHUB_OUTPUT"
          echo "sha_file=$SHA" >> "$GITHUB_OUTPUT"
          echo "release_name=$RELEASE" >> "$GITHUB_OUTPUT"
          echo "safe_release=$SAFE_RELEASE" >> "$GITHUB_OUTPUT"
          echo "extract_dir=$EXTRACT_DIR" >> "$GITHUB_OUTPUT"
          echo "request_file=$REQUEST_FILE" >> "$GITHUB_OUTPUT"
          echo "commit_release_artifacts=$COMMIT_RELEASE_ARTIFACTS" >> "$GITHUB_OUTPUT"

      - name: Verify and extract source
        id: extract
        env:
          ZIP: ${{ steps.resolve.outputs.source_zip }}
          SHA_FILE: ${{ steps.resolve.outputs.sha_file }}
          EXTRACT_DIR: ${{ steps.resolve.outputs.extract_dir }}
        run: |
          set -euo pipefail
          if [[ -n "${SHA_FILE:-}" ]]; then
            cat "$SHA_FILE"
            EXPECTED_NAME="$(awk 'NF >= 2 {print $2; exit}' "$SHA_FILE")"
            if [[ -n "${EXPECTED_NAME:-}" && ! -f "$EXPECTED_NAME" ]]; then
              cp "$ZIP" "$EXPECTED_NAME"
            fi
            sha256sum -c "$SHA_FILE"
          else
            sha256sum "$ZIP"
          fi

          rm -rf "$EXTRACT_DIR"
          mkdir -p "$EXTRACT_DIR"
          unzip -o "$ZIP" -d "$EXTRACT_DIR"
          BUILD_SCRIPT="$(find "$EXTRACT_DIR" -maxdepth 6 -type f -path '*/scripts/install_android_sdk_and_build.sh' | sort | head -n 1)"
          if [[ -z "${BUILD_SCRIPT:-}" || ! -f "$BUILD_SCRIPT" ]]; then
            echo "Could not find scripts/install_android_sdk_and_build.sh" >&2
            find "$EXTRACT_DIR" -maxdepth 6 -type f | sort | head -n 300 >&2
            exit 1
          fi
          PROJECT_DIR="$(dirname "$(dirname "$BUILD_SCRIPT")")"
          chmod +x "$BUILD_SCRIPT"
          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"

      - name: Normalize Android build properties
        env:
          PROJECT_DIR: ${{ steps.extract.outputs.project_dir }}
        run: |
          set -euo pipefail
          MATCHES="$(grep -RIl '^android\.aapt2FromMavenOverride=' "$PROJECT_DIR" 2>/dev/null || true)"
          if [[ -n "${MATCHES:-}" ]]; then
            echo "$MATCHES" | while IFS= read -r file; do
              sed -i.bak '/^android\.aapt2FromMavenOverride=/d' "$file"
              echo "Removed stale AAPT2 override from $file"
            done
          fi

      - name: Apply 2.7.6 Network Discovery Patch
        if: ${{ contains(steps.resolve.outputs.safe_release, '2.7.6_NETWORK_DISCOVERY') }}
        env:
          PROJECT_DIR: ${{ steps.extract.outputs.project_dir }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import json, os, re

          root = Path(os.environ["PROJECT_DIR"])
          allowed = {".kt",".kts",".java",".xml",".gradle",".properties",".md",".txt",".json",".yml",".yaml",".py",".js",".ts"}
          changed = []

          def read_text(path):
              try:
                  return path.read_text(encoding="utf-8")
              except UnicodeDecodeError:
                  return None

          def write_if_changed(path, old, new):
              if new != old:
                  path.write_text(new, encoding="utf-8")
                  changed.append(str(path.relative_to(root)))

          replacements = {
              "v0.2.7.5-admin-registry": "v0.2.7.6-network-discovery",
              "Patch: 2.7.5-ADMIN-REGISTRY": "Patch: 2.7.6-NETWORK-DISCOVERY",
              "Roadmap: 2.7.5": "Roadmap: 2.7.6",
              "Admin Registry / Device Ledger controls / ghost cleanup / queue inspector / forge-ready update loop": "Network Discovery / discovery signature / local node scan / saved server verify / Admin Registry bridge",
              "SWRLZ_CORE_2.7.5_ADMIN_REGISTRY_SOURCE.zip": "SWRLZ_CORE_2.7.5_ADMIN_REGISTRY_SOURCE.zip + 2.7.6_NETWORK_DISCOVERY forge patch",
              "2.7.5-ADMIN-REGISTRY": "2.7.6-NETWORK-DISCOVERY",
              "2.7.5 Admin Registry": "2.7.6 Network Discovery",
          }

          for path in root.rglob("*"):
              if not path.is_file() or path.suffix not in allowed:
                  continue
              text = read_text(path)
              if text is None:
                  continue
              old = text
              for a, b in replacements.items():
                  text = text.replace(a, b)
              text = re.sub(r"\bversionCode\s+18\b", "versionCode 19", text)
              text = re.sub(r"\bversionCode\s*=\s*18\b", "versionCode = 19", text)
              text = re.sub(r'versionName\s+"v0\.2\.7\.5-admin-registry"', 'versionName "v0.2.7.6-network-discovery"', text)
              text = re.sub(r'versionName\s*=\s*"v0\.2\.7\.5-admin-registry"', 'versionName = "v0.2.7.6-network-discovery"', text)
              write_if_changed(path, old, text)

          kt_files = list(root.rglob("*.kt"))
          main_activity = next((p for p in kt_files if p.name == "MainActivity.kt"), None) or next((p for p in kt_files if "MainActivity" in p.name), None)
          if main_activity:
              main_text = read_text(main_activity) or ""
              match = re.search(r"^\s*package\s+([A-Za-z0-9_.]+)", main_text, re.MULTILINE)
              package_name = match.group(1) if match else "sh.swurlz.core"
              helper_lines = [
                  f"package {package_name}", "",
                  "import java.net.HttpURLConnection",
                  "import java.net.URL", "",
                  "data class SwrlzDiscoveryResult(val baseUrl: String, val ok: Boolean, val status: String, val rawSignature: String? = null)", "",
                  "object SwrlzNetworkDiscovery {",
                  "    const val SIGNATURE_PATH: String = \"/discovery/signature\"",
                  "    const val EXPECTED_SERVER: String = \"swrlz-local-node\"",
                  "    const val EXPECTED_SERVER_PATCH: String = \"LNS-0.7.3-DISCOVERY-SIGNATURE\"",
                  "    fun normalizeBaseUrl(input: String): String {",
                  "        val trimmed = input.trim().trimEnd('/')",
                  "        return when {",
                  "            trimmed.startsWith(\"http://\") || trimmed.startsWith(\"https://\") -> trimmed",
                  "            trimmed.isNotBlank() -> \"http://\" + trimmed",
                  "            else -> \"\"",
                  "        }",
                  "    }",
                  "    fun candidateUrls(savedUrl: String? = null, lastKnownUrl: String? = null): List<String> {",
                  "        val candidates = mutableListOf<String>()",
                  "        if (!savedUrl.isNullOrBlank()) candidates += savedUrl",
                  "        if (!lastKnownUrl.isNullOrBlank()) candidates += lastKnownUrl",
                  "        candidates += \"http://127.0.0.1:8787\"",
                  "        candidates += \"http://localhost:8787\"",
                  "        candidates += \"http://10.0.2.2:8787\"",
                  "        candidates += \"http://192.168.0.1:8787\"",
                  "        candidates += \"http://192.168.1.1:8787\"",
                  "        candidates += \"http://192.168.4.1:8787\"",
                  "        return candidates.map { normalizeBaseUrl(it) }.filter { it.isNotBlank() }.distinct()",
                  "    }",
                  "    fun probe(baseUrl: String, timeoutMs: Int = 1500): SwrlzDiscoveryResult {",
                  "        val normalized = normalizeBaseUrl(baseUrl)",
                  "        if (normalized.isBlank()) return SwrlzDiscoveryResult(baseUrl, false, \"EMPTY_URL\", null)",
                  "        var connection: HttpURLConnection? = null",
                  "        return try {",
                  "            connection = URL(normalized + SIGNATURE_PATH).openConnection() as HttpURLConnection",
                  "            connection.connectTimeout = timeoutMs",
                  "            connection.readTimeout = timeoutMs",
                  "            connection.requestMethod = \"GET\"",
                  "            connection.setRequestProperty(\"Accept\", \"application/json\")",
                  "            val code = connection.responseCode",
                  "            val stream = if (code in 200..299) connection.inputStream else connection.errorStream",
                  "            val body = stream?.bufferedReader()?.use { it.readText() } ?: \"\"",
                  "            SwrlzDiscoveryResult(normalized, code in 200..299 && looksLikeSwrlzSignature(body), \"HTTP_\" + code, body)",
                  "        } catch (error: Exception) {",
                  "            SwrlzDiscoveryResult(normalized, false, \"ERROR_\" + error.javaClass.simpleName + \":\" + (error.message ?: \"unknown\"), null)",
                  "        } finally { connection?.disconnect() }",
                  "    }",
                  "    fun firstValid(candidates: List<String>, timeoutMs: Int = 1500): SwrlzDiscoveryResult? {",
                  "        for (candidate in candidates) {",
                  "            val result = probe(candidate, timeoutMs)",
                  "            if (result.ok) return result",
                  "        }",
                  "        return null",
                  "    }",
                  "    private fun looksLikeSwrlzSignature(payload: String): Boolean {",
                  "        val lower = payload.toLowerCase()",
                  "        return lower.contains(\"swrlz-local-node\") && lower.contains(\"discovery-signature\") && lower.contains(\"\\\"ok\\\"\")",
                  "    }",
                  "}",
              ]
              util_path = main_activity.parent / "SwrlzNetworkDiscovery.kt"
              write_if_changed(util_path, read_text(util_path) if util_path.exists() else "", "\n".join(helper_lines) + "\n")

          for manifest in root.rglob("AndroidManifest.xml"):
              text = read_text(manifest)
              if text is None:
                  continue
              old = text
              perms = []
              if "android.permission.INTERNET" not in text:
                  perms.append('    <uses-permission android:name="android.permission.INTERNET" />')
              if "android.permission.ACCESS_NETWORK_STATE" not in text:
                  perms.append('    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />')
              if perms and "<application" in text:
                  text = text.replace("<application", "\n".join(perms) + "\n\n    <application", 1)
              write_if_changed(manifest, old, text)

          signature = {"ok": True, "server": "swrlz-local-node", "version": "0.7.3-discovery-signature", "patch": "LNS-0.7.3-DISCOVERY-SIGNATURE", "port": 8787}
          sig_dir = root / "server"
          sig_dir.mkdir(exist_ok=True)
          sig_path = sig_dir / "discovery_signature_0_7_3.json"
          write_if_changed(sig_path, read_text(sig_path) if sig_path.exists() else "", json.dumps(signature, indent=2) + "\n")

          receipt = """# SWRLZ-Core 2.7.6 Network Discovery Forge Receipt

          PROVEN BY FORGE PATCH:
          - Build identity moved to 2.7.6 Network Discovery.
          - versionName target: v0.2.7.6-network-discovery.
          - versionCode target: 19.
          - Kotlin local-first discovery helper added when MainActivity package is found.
          - Android network permissions ensured.
          - Server discovery signature JSON added.

          TRUTHFUL SOURCE LINE:
          This build is produced from SWRLZ_CORE_2.7.5_ADMIN_REGISTRY_SOURCE.zip plus the visible 2.7.6_NETWORK_DISCOVERY forge patch.
          """
          receipt_path = root / "SWRLZ_2.7.6_NETWORK_DISCOVERY_PATCH_RECEIPT.md"
          write_if_changed(receipt_path, read_text(receipt_path) if receipt_path.exists() else "", receipt)

          if not changed:
              raise SystemExit("2.7.6 Network Discovery patch failed: no files changed.")
          print("2.7.6 Network Discovery patched files:")
          print("\n".join(changed))
          PY
          grep -RInE '2\.7\.6-NETWORK-DISCOVERY|v0\.2\.7\.6-network-discovery|SwrlzNetworkDiscovery|/discovery/signature|LNS-0\.7\.3-DISCOVERY-SIGNATURE' "$PROJECT_DIR" || true

      - name: Build Android debug APK
        id: build
        env:
          PROJECT_DIR: ${{ steps.extract.outputs.project_dir }}
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"
          export JAVA_HOME="$JAVA_HOME_17_X64"
          export PATH="$JAVA_HOME/bin:$PATH"
          java -version
          bash scripts/install_android_sdk_and_build.sh
          OUT_DIR="$PROJECT_DIR/APK_DOWNLOAD"
          if [[ ! -d "$OUT_DIR" ]]; then
            find "$PROJECT_DIR" -type f \( -iname '*.apk' -o -iname '*.aab' \)
            exit 1
          fi
          echo "output_dir=$OUT_DIR" >> "$GITHUB_OUTPUT"
          find "$OUT_DIR" -maxdepth 1 -type f -print -exec ls -lh {} \;

      - name: Create GitHub Actions build summary
        env:
          OUT_DIR: ${{ steps.build.outputs.output_dir }}
          RELEASE_NAME: ${{ steps.resolve.outputs.release_name }}
          SOURCE_ZIP: ${{ steps.resolve.outputs.source_zip_base }}
          SHA_FILE: ${{ steps.resolve.outputs.sha_file }}
          SAFE_RELEASE: ${{ steps.resolve.outputs.safe_release }}
          REQUEST_FILE: ${{ steps.resolve.outputs.request_file }}
        run: |
          set -euo pipefail
          SUMMARY_FILE="$OUT_DIR/GITHUB_ACTIONS_BUILD_SUMMARY.md"
          {
            echo "# SWRLZ GitHub Actions Build Summary"
            echo
            echo "- Release: $RELEASE_NAME"
            echo "- Safe release folder: $SAFE_RELEASE"
            echo "- Source ZIP: $SOURCE_ZIP"
            echo "- SHA file: ${SHA_FILE:-<none>}"
            echo "- Build request file: ${REQUEST_FILE:-<none>}"
            echo "- Workflow: $GITHUB_WORKFLOW"
            echo "- Run ID: $GITHUB_RUN_ID"
            echo "- Commit: $GITHUB_SHA"
            echo "- Built at: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo
            echo "## Output files"
            find "$OUT_DIR" -maxdepth 1 -type f -printf '- `%f` (%s bytes)\n' | sort
            echo
            echo "## SHA256"
            find "$OUT_DIR" -maxdepth 1 -type f ! -iname '*.sha256' -exec sha256sum {} \; | sed "s#$OUT_DIR/##"
          } > "$SUMMARY_FILE"
          cat "$SUMMARY_FILE" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload APK_DOWNLOAD artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.resolve.outputs.safe_release }}_APK_DOWNLOAD
          path: ${{ steps.build.outputs.output_dir }}/*
          if-no-files-found: error
          retention-days: 30

      - name: Optionally commit release artifacts and update manifests
        if: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.commit_release_artifacts == 'true') || steps.resolve.outputs.commit_release_artifacts == 'true' }}
        env:
          OUT_DIR: ${{ steps.build.outputs.output_dir }}
          RELEASE_NAME: ${{ steps.resolve.outputs.release_name }}
          SAFE_RELEASE: ${{ steps.resolve.outputs.safe_release }}
          SOURCE_ZIP: ${{ steps.resolve.outputs.source_zip_base }}
        run: |
          set -euo pipefail
          REL_DIR="$SWRLZ_RELEASES_DIR/${SAFE_RELEASE}_APK"
          mkdir -p "$REL_DIR" "$SWRLZ_UPDATES_DIR"
          cp -a "$OUT_DIR"/. "$REL_DIR"/
          APK_FILE="$(find "$REL_DIR" -maxdepth 1 -type f -iname '*debug.apk' | sort | head -n 1 || true)"
          BUNDLE_FILE="$(find "$REL_DIR" -maxdepth 1 -type f -iname '*APK_DOWNLOAD*.zip' | sort | head -n 1 || true)"
          APK_SHA=""
          BUNDLE_SHA=""
          if [[ -n "${APK_FILE:-}" ]]; then APK_SHA="$(sha256sum "$APK_FILE" | awk '{print $1}')"; fi
          if [[ -n "${BUNDLE_FILE:-}" ]]; then BUNDLE_SHA="$(sha256sum "$BUNDLE_FILE" | awk '{print $1}')"; fi
          MANIFEST_FILE="$SWRLZ_UPDATES_DIR/${SAFE_RELEASE}_manifest.json"
          LATEST_FILE="$SWRLZ_UPDATES_DIR/latest_client.json"
          cat > "$MANIFEST_FILE" <<JSON
          {
            "schema": 1,
            "release": "$RELEASE_NAME",
            "source_zip": "$SOURCE_ZIP",
            "built_at_utc": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "repo_commit": "$GITHUB_SHA",
            "artifact_folder": "$REL_DIR",
            "apk_file": "${APK_FILE:-}",
            "apk_sha256": "$APK_SHA",
            "bundle_file": "${BUNDLE_FILE:-}",
            "bundle_sha256": "$BUNDLE_SHA",
            "update_modes": {
              "apk_install_update": true,
              "hot_patch_assets": true,
              "silent_self_install": false
            }
          }
          JSON
          cp "$MANIFEST_FILE" "$LATEST_FILE"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$REL_DIR" "$MANIFEST_FILE" "$LATEST_FILE"
          git commit -m "build: add ${RELEASE_NAME} APK artifacts and update manifest" || exit 0
          git push
