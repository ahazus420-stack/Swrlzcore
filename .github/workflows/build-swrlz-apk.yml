name: Build SWRLZ APK

on:
  workflow_dispatch:
    inputs:
      source_zip:
        description: "Optional source ZIP path. Leave blank to use current request."
        required: false
        default: ""
      sha_file:
        description: "Optional SHA256 file path."
        required: false
        default: ""
      release_name:
        description: "Optional release label."
        required: false
        default: ""
      commit_release_artifacts:
        description: "Commit APK output and update manifests."
        required: false
        type: boolean
        default: false
  push:
    paths:
      # Checkmate rule: staged source uploads and archive cleanup do not build APKs.
      # The build trigger is the active request file only.
      - "BUILD_REQUESTS/000_CURRENT.request"
      - "BUILD_REQUESTS/CURRENT.request"
      - ".github/workflows/build-swrlz-apk.yml"

permissions:
  contents: write

defaults:
  run:
    shell: bash

env:
  SWRLZ_SOURCES_DIR: SOURCES
  SWRLZ_BUILD_REQUESTS_DIR: BUILD_REQUESTS
  SWRLZ_BUILD_WORK_DIR: BUILD_WORK
  SWRLZ_RELEASES_DIR: RELEASES
  SWRLZ_UPDATES_DIR: UPDATES

jobs:
  build-swrlz-apk:
    name: Build SWRLZ APK from active request
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Resolve active source request
        id: resolve
        env:
          INPUT_SOURCE_ZIP: ${{ github.event.inputs.source_zip }}
          INPUT_SHA_FILE: ${{ github.event.inputs.sha_file }}
          INPUT_RELEASE_NAME: ${{ github.event.inputs.release_name }}
          INPUT_COMMIT_RELEASE_ARTIFACTS: ${{ github.event.inputs.commit_release_artifacts }}
        run: |
          set -euo pipefail
          mkdir -p "$SWRLZ_SOURCES_DIR" "$SWRLZ_BUILD_REQUESTS_DIR" "$SWRLZ_BUILD_WORK_DIR" "$SWRLZ_RELEASES_DIR" "$SWRLZ_UPDATES_DIR"

          REQUEST_FILE=""
          for candidate in "$SWRLZ_BUILD_REQUESTS_DIR/000_CURRENT.request" "$SWRLZ_BUILD_REQUESTS_DIR/CURRENT.request"; do
            if [[ -f "$candidate" ]]; then
              REQUEST_FILE="$candidate"
              break
            fi
          done

          R_SOURCE=""
          R_SHA=""
          R_RELEASE=""
          R_COMMIT="false"
          if [[ -n "${REQUEST_FILE:-}" && -f "$REQUEST_FILE" ]]; then
            echo "Using active build request: $REQUEST_FILE"
            cat "$REQUEST_FILE"
            R_SOURCE="$(grep -E '^source_zip=' "$REQUEST_FILE" | tail -n 1 | cut -d= -f2- || true)"
            R_SHA="$(grep -E '^sha_file=' "$REQUEST_FILE" | tail -n 1 | cut -d= -f2- || true)"
            R_RELEASE="$(grep -E '^release_name=' "$REQUEST_FILE" | tail -n 1 | cut -d= -f2- || true)"
            R_COMMIT="$(grep -E '^commit_release_artifacts=' "$REQUEST_FILE" | tail -n 1 | cut -d= -f2- || true)"
            if [[ -z "${R_COMMIT:-}" ]]; then R_COMMIT="true"; fi
          else
            echo "No active request file found. Manual workflow inputs are required."
          fi

          ZIP="${INPUT_SOURCE_ZIP:-${R_SOURCE:-}}"
          SHA="${INPUT_SHA_FILE:-${R_SHA:-}}"
          RELEASE="${INPUT_RELEASE_NAME:-${R_RELEASE:-}}"
          COMMIT_RELEASE_ARTIFACTS="${INPUT_COMMIT_RELEASE_ARTIFACTS:-${R_COMMIT:-false}}"

          if [[ -z "${ZIP:-}" || ! -f "$ZIP" ]]; then
            echo "Could not resolve source ZIP: ${ZIP:-<empty>}" >&2
            find "$SWRLZ_SOURCES_DIR" -maxdepth 4 -type f -iname '*.zip' 2>/dev/null | sort >&2 || true
            exit 1
          fi
          if [[ -n "${SHA:-}" && ! -f "$SHA" ]]; then
            echo "Specified SHA file not found: $SHA" >&2
            exit 1
          fi
          if [[ -z "${RELEASE:-}" ]]; then
            RELEASE="$(basename "$ZIP" .zip)"
          fi

          ZIP_BASE="$(basename "$ZIP")"
          SAFE_RELEASE="$(echo "$RELEASE" | tr -cs 'A-Za-z0-9._-' '_' | sed 's/^_*//;s/_*$//')"
          EXTRACT_DIR="$GITHUB_WORKSPACE/$SWRLZ_BUILD_WORK_DIR/$SAFE_RELEASE/extracted"

          {
            echo "source_zip=$ZIP"
            echo "source_zip_base=$ZIP_BASE"
            echo "sha_file=$SHA"
            echo "release_name=$RELEASE"
            echo "safe_release=$SAFE_RELEASE"
            echo "extract_dir=$EXTRACT_DIR"
            echo "request_file=$REQUEST_FILE"
            echo "commit_release_artifacts=$COMMIT_RELEASE_ARTIFACTS"
          } >> "$GITHUB_OUTPUT"

          echo "Resolved release: $RELEASE"
          echo "Resolved source ZIP: $ZIP"
          echo "Resolved SHA file: ${SHA:-<none>}"

      - name: Verify and extract source
        id: extract
        env:
          ZIP: ${{ steps.resolve.outputs.source_zip }}
          SHA_FILE: ${{ steps.resolve.outputs.sha_file }}
          EXTRACT_DIR: ${{ steps.resolve.outputs.extract_dir }}
        run: |
          set -euo pipefail
          if [[ -n "${SHA_FILE:-}" ]]; then
            cat "$SHA_FILE"
            EXPECTED_NAME="$(awk 'NF >= 2 {print $2; exit}' "$SHA_FILE")"
            if [[ -n "${EXPECTED_NAME:-}" && ! -f "$EXPECTED_NAME" ]]; then
              cp "$ZIP" "$EXPECTED_NAME"
            fi
            sha256sum -c "$SHA_FILE"
          else
            sha256sum "$ZIP"
          fi

          rm -rf "$EXTRACT_DIR"
          mkdir -p "$EXTRACT_DIR"
          unzip -o "$ZIP" -d "$EXTRACT_DIR"
          BUILD_SCRIPT="$(find "$EXTRACT_DIR" -maxdepth 8 -type f -path '*/scripts/install_android_sdk_and_build.sh' | sort | head -n 1)"
          if [[ -z "${BUILD_SCRIPT:-}" || ! -f "$BUILD_SCRIPT" ]]; then
            echo "Could not find scripts/install_android_sdk_and_build.sh" >&2
            find "$EXTRACT_DIR" -maxdepth 8 -type f | sort | head -n 300 >&2
            exit 1
          fi
          PROJECT_DIR="$(dirname "$(dirname "$BUILD_SCRIPT")")"
          chmod +x "$BUILD_SCRIPT"
          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"

      - name: Normalize Android build properties
        env:
          PROJECT_DIR: ${{ steps.extract.outputs.project_dir }}
        run: |
          set -euo pipefail
          MATCHES="$(grep -RIl '^android\.aapt2FromMavenOverride=' "$PROJECT_DIR" 2>/dev/null || true)"
          if [[ -n "${MATCHES:-}" ]]; then
            echo "$MATCHES" | while IFS= read -r file; do
              sed -i.bak '/^android\.aapt2FromMavenOverride=/d' "$file"
              echo "Removed stale AAPT2 override from $file"
            done
          fi

      - name: Build Android debug APK
        id: build
        env:
          PROJECT_DIR: ${{ steps.extract.outputs.project_dir }}
          SAFE_RELEASE: ${{ steps.resolve.outputs.safe_release }}
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"
          export JAVA_HOME="$JAVA_HOME_17_X64"
          export PATH="$JAVA_HOME/bin:$PATH"
          java -version
          bash scripts/install_android_sdk_and_build.sh

          OUT_DIR="$PROJECT_DIR/APK_DOWNLOAD"
          if [[ ! -d "$OUT_DIR" ]]; then
            find "$PROJECT_DIR" -type f \( -iname '*.apk' -o -iname '*.aab' \)
            exit 1
          fi

          APK_SRC="$(find "$OUT_DIR" -maxdepth 1 -type f -iname '*.apk' | sort | head -n 1 || true)"
          if [[ -n "${APK_SRC:-}" ]]; then
            APK_DEST="$OUT_DIR/${SAFE_RELEASE}_debug.apk"
            if [[ "$APK_SRC" != "$APK_DEST" ]]; then mv "$APK_SRC" "$APK_DEST"; fi
          fi

          ZIP_SRC="$(find "$OUT_DIR" -maxdepth 1 -type f -iname '*APK_DOWNLOAD*.zip' | sort | head -n 1 || true)"
          if [[ -n "${ZIP_SRC:-}" ]]; then
            ZIP_DEST="$OUT_DIR/${SAFE_RELEASE}_APK_DOWNLOAD.zip"
            if [[ "$ZIP_SRC" != "$ZIP_DEST" ]]; then mv "$ZIP_SRC" "$ZIP_DEST"; fi
          fi

          echo "output_dir=$OUT_DIR" >> "$GITHUB_OUTPUT"
          find "$OUT_DIR" -maxdepth 1 -type f -print -exec ls -lh {} \;

      - name: Stable dev signing status and optional APK re-sign
        id: signing
        env:
          OUT_DIR: ${{ steps.build.outputs.output_dir }}
          SWRLZ_DEV_KEYSTORE_BASE64: ${{ secrets.SWRLZ_DEV_KEYSTORE_BASE64 }}
          SWRLZ_DEV_KEYSTORE_PASSWORD: ${{ secrets.SWRLZ_DEV_KEYSTORE_PASSWORD }}
          SWRLZ_DEV_KEY_ALIAS: ${{ secrets.SWRLZ_DEV_KEY_ALIAS }}
          SWRLZ_DEV_KEY_PASSWORD: ${{ secrets.SWRLZ_DEV_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          SIGNING_MODE="debug-runner-default"
          if [[ -n "${SWRLZ_DEV_KEYSTORE_BASE64:-}" && -n "${SWRLZ_DEV_KEYSTORE_PASSWORD:-}" && -n "${SWRLZ_DEV_KEY_ALIAS:-}" && -n "${SWRLZ_DEV_KEY_PASSWORD:-}" ]]; then
            echo "Stable SWRLZ dev signing secrets detected."
            KEYSTORE="$RUNNER_TEMP/swrlz-dev-signing.jks"
            echo "$SWRLZ_DEV_KEYSTORE_BASE64" | base64 -d > "$KEYSTORE"
            APKSIGNER="$(find "${ANDROID_HOME:-$HOME}" -type f -name apksigner 2>/dev/null | sort -V | tail -n 1 || true)"
            ZIPALIGN="$(find "${ANDROID_HOME:-$HOME}" -type f -name zipalign 2>/dev/null | sort -V | tail -n 1 || true)"
            if [[ -z "${APKSIGNER:-}" || -z "${ZIPALIGN:-}" ]]; then
              echo "Stable signing requested, but apksigner/zipalign was not found." >&2
              exit 1
            fi
            for APK in "$OUT_DIR"/*.apk; do
              [[ -f "$APK" ]] || continue
              BASE="${APK%.apk}"
              ALIGNED="${BASE}_aligned.apk"
              SIGNED="${BASE}_stable-signed.apk"
              "$ZIPALIGN" -f -p 4 "$APK" "$ALIGNED"
              "$APKSIGNER" sign --ks "$KEYSTORE" --ks-pass "pass:$SWRLZ_DEV_KEYSTORE_PASSWORD" --ks-key-alias "$SWRLZ_DEV_KEY_ALIAS" --key-pass "pass:$SWRLZ_DEV_KEY_PASSWORD" --out "$SIGNED" "$ALIGNED"
              "$APKSIGNER" verify "$SIGNED"
              rm -f "$ALIGNED"
            done
            SIGNING_MODE="stable-dev-signing-active"
          else
            echo "Stable SWRLZ dev signing secrets not configured; using runner/debug signing."
          fi
          echo "$SIGNING_MODE" > "$OUT_DIR/SWRLZ_SIGNING_MODE.txt"
          echo "signing_mode=$SIGNING_MODE" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Actions build summary
        env:
          OUT_DIR: ${{ steps.build.outputs.output_dir }}
          RELEASE_NAME: ${{ steps.resolve.outputs.release_name }}
          SOURCE_ZIP: ${{ steps.resolve.outputs.source_zip_base }}
          SHA_FILE: ${{ steps.resolve.outputs.sha_file }}
          SAFE_RELEASE: ${{ steps.resolve.outputs.safe_release }}
          REQUEST_FILE: ${{ steps.resolve.outputs.request_file }}
          SIGNING_MODE: ${{ steps.signing.outputs.signing_mode }}
        run: |
          set -euo pipefail
          SUMMARY_FILE="$OUT_DIR/GITHUB_ACTIONS_BUILD_SUMMARY.md"
          {
            echo "# SWRLZ GitHub Actions Build Summary"
            echo
            echo "- Release: $RELEASE_NAME"
            echo "- Safe release folder: $SAFE_RELEASE"
            echo "- Source ZIP: $SOURCE_ZIP"
            echo "- SHA file: ${SHA_FILE:-<none>}"
            echo "- Build request file: ${REQUEST_FILE:-<none>}"
            echo "- Signing mode: ${SIGNING_MODE:-unknown}"
            echo "- Workflow: $GITHUB_WORKFLOW"
            echo "- Run ID: $GITHUB_RUN_ID"
            echo "- Commit: $GITHUB_SHA"
            echo "- Built at: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo
            echo "## Output files"
            find "$OUT_DIR" -maxdepth 1 -type f -printf '- `%f` (%s bytes)\n' | sort
            echo
            echo "## SHA256"
            find "$OUT_DIR" -maxdepth 1 -type f ! -iname '*.sha256' -exec sha256sum {} \; | sed "s#$OUT_DIR/##"
          } > "$SUMMARY_FILE"
          cat "$SUMMARY_FILE" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload APK_DOWNLOAD artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.resolve.outputs.safe_release }}_APK_DOWNLOAD
          path: ${{ steps.build.outputs.output_dir }}/*
          if-no-files-found: error
          retention-days: 30

      - name: Optionally commit release artifacts and update manifests
        if: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.commit_release_artifacts == 'true') || steps.resolve.outputs.commit_release_artifacts == 'true' }}
        env:
          OUT_DIR: ${{ steps.build.outputs.output_dir }}
          RELEASE_NAME: ${{ steps.resolve.outputs.release_name }}
          SAFE_RELEASE: ${{ steps.resolve.outputs.safe_release }}
          SOURCE_ZIP: ${{ steps.resolve.outputs.source_zip_base }}
          SIGNING_MODE: ${{ steps.signing.outputs.signing_mode }}
        run: |
          set -euo pipefail
          REL_DIR="$SWRLZ_RELEASES_DIR/${SAFE_RELEASE}_APK"
          mkdir -p "$REL_DIR" "$SWRLZ_UPDATES_DIR"
          cp -a "$OUT_DIR"/. "$REL_DIR"/

          APK_FILE="$(find "$REL_DIR" -maxdepth 1 -type f \( -iname "${SAFE_RELEASE}_debug.apk" -o -iname "${SAFE_RELEASE}_debug_stable-signed.apk" -o -iname 'APK_*_DEBUG.apk' -o -iname '*_debug.apk' \) | sort | head -n 1 || true)"
          BUNDLE_FILE="$(find "$REL_DIR" -maxdepth 1 -type f \( -iname "${SAFE_RELEASE}_APK_DOWNLOAD.zip" -o -iname 'BUNDLE_*.zip' -o -iname '*APK_DOWNLOAD*.zip' \) | sort | head -n 1 || true)"
          APK_SHA=""
          BUNDLE_SHA=""
          if [[ -n "${APK_FILE:-}" ]]; then APK_SHA="$(sha256sum "$APK_FILE" | awk '{print $1}')"; fi
          if [[ -n "${BUNDLE_FILE:-}" ]]; then BUNDLE_SHA="$(sha256sum "$BUNDLE_FILE" | awk '{print $1}')"; fi

          MANIFEST_FILE="$SWRLZ_UPDATES_DIR/${SAFE_RELEASE}_manifest.json"
          LATEST_FILE="$SWRLZ_UPDATES_DIR/latest_client.json"
          cat > "$MANIFEST_FILE" <<JSON
          {
            "schema": 1,
            "release": "$RELEASE_NAME",
            "source_zip": "$SOURCE_ZIP",
            "built_at_utc": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "repo_commit": "$GITHUB_SHA",
            "artifact_folder": "$REL_DIR",
            "apk_file": "${APK_FILE:-}",
            "apk_sha256": "$APK_SHA",
            "bundle_file": "${BUNDLE_FILE:-}",
            "bundle_sha256": "$BUNDLE_SHA",
            "signing_mode": "${SIGNING_MODE:-unknown}",
            "update_modes": {
              "apk_install_update": true,
              "hot_patch_assets": true,
              "silent_self_install": false
            }
          }
          JSON
          cp "$MANIFEST_FILE" "$LATEST_FILE"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$REL_DIR" "$MANIFEST_FILE" "$LATEST_FILE"

          if git diff --cached --quiet; then
            echo "No release artifact changes to commit."
            exit 0
          fi

          if ! git commit -m "build: add ${RELEASE_NAME} APK artifacts and update manifest"; then
            echo "::warning::Release artifact commit failed after APK artifact upload. Build artifact remains valid."
            exit 0
          fi

          if ! git push; then
            echo "::warning::Release artifact push failed after APK artifact upload. Build artifact remains valid."
            exit 0
          fi
